<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fig-1 Histogram of LOC per Module – SLMS Experiment 3</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 24px; background: #fafafa; }
    h1 { font-size: 1.25rem; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 0.875rem; color: #666; margin-bottom: 20px; }
    .chart-container { max-width: 900px; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    canvas { max-height: 420px; }
    .fig-label { margin-top: 12px; font-size: 0.75rem; color: #888; }
  </style>
</head>
<body>
  <div class="chart-container">
    <h1>Histogram of Lines of Code (LOC) per Module</h1>
    <p class="subtitle">Student Learning Management System (SLMS) – Size Metrics – Experiment 3</p>
    <canvas id="histogram"></canvas>
    <p class="fig-label">Fig-1 Histogram of LOC per functional module (excluding Shared/Infrastructure).</p>
  </div>

  <script>
    const modules = [
      'User Auth', 'Course Mgmt', 'Enrollment', 'Assignment & Grading',
      'Discussion', 'Dashboard', 'Google Drive', 'Text Mgmt', 'QR Code', 'Text Utils'
    ];
    const loc = [898, 1763, 661, 2623, 696, 388, 1822, 982, 193, 306];

    new Chart(document.getElementById('histogram'), {
      type: 'bar',
      data: {
        labels: modules,
        datasets: [{
          label: 'Lines of Code (LOC)',
          data: loc,
          backgroundColor: 'rgba(99, 102, 241, 0.7)',
          borderColor: 'rgb(99, 102, 241)',
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          title: { display: false }
        },
        scales: {
          x: {
            title: { display: true, text: 'Functional Module' },
            ticks: { maxRotation: 45, minRotation: 45, font: { size: 10 } }
          },
          y: {
            title: { display: true, text: 'Count (LOC)' },
            beginAtZero: true,
            ticks: { stepSize: 500 }
          }
        }
      }
    });
  </script>
</body>
</html>
